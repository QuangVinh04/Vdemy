
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /vinh

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  main:
    allow-bean-definition-overriding: true

  # ---- Datasource ----
  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/web_course"
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---- JPA / Hibernate ----
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}

  # ---- Security / OAuth2 ----
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/authenticate}
            scope:
              - email
              - profile
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/QVinh}

  # ---- Redis ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ---- Mail ----
  mail:
    from: ${MAIL_FROM}
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

  # ---- Kafka ----
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

  # ---- Multipart (Upload) ----
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 200MB

# =====================================================================
# Custom Application Properties
# =====================================================================

# ---- Email templates ----
endpoint:
  confirmUser: ${CONFIRM_USER_URL:http://localhost:3000/login}



# ---- Cloudinary ----
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# ---- JWT ----
jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION:3600}       # in seconds
  refreshable-duration: ${JWT_REFRESH_DURATION:14} # in days

# ---- OpenAPI / Swagger ----
openapi:
  service:
    api-docs: api-service
    server: ${OPENAPI_SERVER_URL:http://localhost:8081/vinh}
    title: API Service
    version: v1.0.0

# ---- VNPay Payment ----
payment:
  vnPay:
    url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    tmnCode: ${VNPAY_TMN_CODE}
    secretKey: ${VNPAY_SECRET_KEY}
    ipnUrl: ${VNPAY_IPN_URL:http://{domain}/vinh/api/payment/vnpay}
    returnUrl: ${VNPAY_RETURN_URL:http://localhost:3000/payment/vnpay-result}
    version: 2.1.0
    command: pay
    orderType: other

# ---- MVC / CORS ----
mvc:
  static-path-pattern: /**
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"
    exposed-headers: "Authorization"
    allow-credentials: true
    max-age: 3600