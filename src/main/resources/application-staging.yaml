# =====================================================================
# VDEMY - Staging Profile
# =====================================================================
# Môi trường staging / test trước khi đưa lên production
# Active: SPRING_PROFILES_ACTIVE=staging
#
# Giống production nhưng:
#   - Có logging chi tiết hơn để debug
#   - ddl-auto: update (cho phép thay đổi schema khi test)
#   - Có show-sql để theo dõi query
# =====================================================================

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update   # Cho phép update schema ở staging

  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/web_course"
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

# ---- Logging - INFO level, ghi ra file + console ----
logging:
  level:
    root: INFO
    V1Learn.spring: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/vdemy/application-staging.log
  logback:
    rolling policy:
      max-file-size: 10MB
      max-history: 15
